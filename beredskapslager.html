<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beredskapslager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #ddd5c0;
    --text: #2a2418;
    --text-muted: #7a6f5a;
    --accent: #2d5016;
    --accent-light: #4a7a28;
    --accent-bg: #e8f2de;
    --warn: #b85c00;
    --warn-bg: #fdf0e0;
    --danger: #8b1a1a;
    --danger-bg: #fde8e8;
    --ok: #2d5016;
    --ok-bg: #e8f2de;
    --shadow: 0 2px 12px rgba(42,36,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,24,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 24px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  header p {
    font-size: 0.8rem;
    opacity: 0.75;
    font-weight: 300;
  }

  .stats-bar {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .stat {
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .stat span {
    font-size: 1.1rem;
    font-weight: 600;
    display: block;
  }

  .search-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 115px;
    z-index: 90;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }

  .category-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 167px;
    z-index: 89;
  }

  .category-tabs::-webkit-scrollbar { display: none; }

  .tab {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .content { padding: 16px; }

  .category-section { margin-bottom: 20px; }

  .category-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  .category-icon { font-size: 1.3rem; }

  .category-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    flex: 1;
  }

  .category-count {
    background: var(--surface2);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .item-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .item-card:active { transform: scale(0.99); }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .item-qty {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  .expiry-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 4px;
  }

  .badge-ok { background: var(--ok-bg); color: var(--ok); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-none { background: var(--surface2); color: var(--text-muted); }

  .item-actions {
    display: flex;
    gap: 6px;
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-icon.edit:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .fab {
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(50%);
    max-width: 440px;
    width: calc(100% - 40px);
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.15s;
    z-index: 200;
  }

  .fab:active { transform: translateX(50%) scale(0.98); background: var(--accent-light); }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,36,24,0.5);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    flex: 1;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .btn-submit:active { background: var(--accent-light); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; }

  .expiring-soon {
    background: var(--warn-bg);
    border: 1.5px solid #e8a040;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: var(--warn);
    font-weight: 500;
  }

  .expiring-soon strong { display: block; margin-bottom: 2px; font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>🏠 Beredskapslager</h1>
  <p>Oversikt over forsyninger og utløpsdatoer</p>
  <div class="stats-bar">
    <div class="stat"><span id="total-count">0</span>varer</div>
    <div class="stat"><span id="expiring-count">0</span>utløper snart</div>
    <div class="stat"><span id="expired-count">0</span>utgått</div>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Søk i lageret..." oninput="render()">
</div>

<div class="category-tabs" id="tabs"></div>

<div class="content" id="content"></div>

<button class="fab" onclick="openModal()">＋ Legg til vare</button>

<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Ny vare</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Navn på vare</label>
      <input type="text" id="f-name" placeholder="f.eks. Tomatsuppe">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Antall</label>
        <input type="number" id="f-qty" placeholder="1" min="1">
      </div>
      <div class="form-group">
        <label>Enhet</label>
        <select id="f-unit">
          <option>stk</option>
          <option>liter</option>
          <option>kg</option>
          <option>g</option>
          <option>pakke</option>
          <option>boks</option>
          <option>pose</option>
          <option>flaske</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="f-cat">
        <option value="mat">🥫 Mat & Hermetikk</option>
        <option value="drikke">💧 Drikke & Vann</option>
        <option value="medisin">💊 Medisin & Førstehjelpsutstyr</option>
        <option value="hygiene">🧼 Hygiene & Rengjøring</option>
        <option value="lys">🕯️ Lys & Batteri</option>
        <option value="varme">🔥 Varme & Klær</option>
        <option value="annet">📦 Annet</option>
      </select>
    </div>
    <div class="form-group">
      <label>Utløpsdato (valgfritt)</label>
      <input type="date" id="f-expiry">
    </div>
    <div class="form-group">
      <label>Notat (valgfritt)</label>
      <input type="text" id="f-note" placeholder="f.eks. merkevare, plassering...">
    </div>
    <button class="btn-submit" onclick="saveItem()">Lagre vare</button>
  </div>
</div>

<script>
const CATEGORIES = {
  mat:    { label: 'Mat & Hermetikk',           icon: '🥫' },
  drikke: { label: 'Drikke & Vann',             icon: '💧' },
  medisin:{ label: 'Medisin & Førstehjelp',     icon: '💊' },
  hygiene:{ label: 'Hygiene & Rengjøring',      icon: '🧼' },
  lys:    { label: 'Lys & Batteri',             icon: '🕯️' },
  varme:  { label: 'Varme & Klær',              icon: '🔥' },
  annet:  { label: 'Annet',                     icon: '📦' },
};

let items = JSON.parse(localStorage.getItem('beredskapslager') || '[]');
let editId = null;
let activeTab = 'alle';

function save() {
  localStorage.setItem('beredskapslager', JSON.stringify(items));
}

function getDaysLeft(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function expiryBadge(dateStr) {
  const d = getDaysLeft(dateStr);
  if (d === null) return '<span class="expiry-badge badge-none">Ingen dato</span>';
  if (d < 0) return `<span class="expiry-badge badge-danger">Utgått for ${-d} dag${-d===1?'':'er'} siden</span>`;
  if (d === 0) return '<span class="expiry-badge badge-danger">Utgår i dag!</span>';
  if (d <= 30) return `<span class="expiry-badge badge-warn">Utløper om ${d} dag${d===1?'':'er'}</span>`;
  if (d <= 90) return `<span class="expiry-badge badge-warn">Utløper om ${d} dager</span>`;
  const date = new Date(dateStr);
  return `<span class="expiry-badge badge-ok">${date.toLocaleDateString('no-NO', {day:'numeric', month:'short', year:'numeric'})}</span>`;
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  
  // Stats
  const expiringSoon = items.filter(i => { const d = getDaysLeft(i.expiry); return d !== null && d >= 0 && d <= 30; });
  const expired = items.filter(i => { const d = getDaysLeft(i.expiry); return d !== null && d < 0; });
  document.getElementById('total-count').textContent = items.length;
  document.getElementById('expiring-count').textContent = expiringSoon.length;
  document.getElementById('expired-count').textContent = expired.length;

  // Tabs
  const usedCats = [...new Set(items.map(i => i.category))];
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = `<button class="tab ${activeTab==='alle'?'active':''}" onclick="setTab('alle')">Alle (${items.length})</button>`;
  usedCats.forEach(cat => {
    const count = items.filter(i => i.category === cat).length;
    tabsEl.innerHTML += `<button class="tab ${activeTab===cat?'active':''}" onclick="setTab('${cat}')">${CATEGORIES[cat]?.icon} ${CATEGORIES[cat]?.label} (${count})</button>`;
  });

  // Filter
  let filtered = items.filter(i => {
    const matchQ = !q || i.name.toLowerCase().includes(q) || (i.note||'').toLowerCase().includes(q);
    const matchTab = activeTab === 'alle' || i.category === activeTab;
    return matchQ && matchTab;
  });

  const content = document.getElementById('content');

  // Expiring warning
  let html = '';
  if (expired.length > 0 && !q && activeTab === 'alle') {
    html += `<div class="expiring-soon">⚠️ <strong>${expired.length} vare${expired.length>1?'r':''} er utgått på dato!</strong>Sjekk og erstatt disse snarest.</div>`;
  } else if (expiringSoon.length > 0 && !q && activeTab === 'alle') {
    html += `<div class="expiring-soon">🕐 <strong>${expiringSoon.length} vare${expiringSoon.length>1?'r':''} utløper innen 30 dager.</strong>Husk å fornye lageret ditt.</div>`;
  }

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">📦</div><p>${items.length === 0 ? 'Lageret er tomt. Trykk + for å legge til din første vare!' : 'Ingen varer matcher søket.'}</p></div>`;
    content.innerHTML = html;
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  Object.entries(groups).forEach(([cat, catItems]) => {
    const info = CATEGORIES[cat] || { label: cat, icon: '📦' };
    html += `<div class="category-section">
      <div class="category-header">
        <span class="category-icon">${info.icon}</span>
        <span class="category-title">${info.label}</span>
        <span class="category-count">${catItems.length} varer</span>
      </div>`;
    catItems.forEach(item => {
      html += `<div class="item-card">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.note || ''}</div>
          ${expiryBadge(item.expiry)}
        </div>
        <div class="item-qty">${item.qty} ${item.unit}</div>
        <div class="item-actions">
          <button class="btn-icon edit" onclick="editItem('${item.id}')" title="Rediger">✏️</button>
          <button class="btn-icon" onclick="deleteItem('${item.id}')" title="Slett">🗑️</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
}

function setTab(tab) {
  activeTab = tab;
  render();
}

function openModal(id = null) {
  editId = id;
  const item = id ? items.find(i => i.id === id) : null;
  document.getElementById('modal-title').textContent = item ? 'Rediger vare' : 'Ny vare';
  document.getElementById('f-name').value = item ? item.name : '';
  document.getElementById('f-qty').value = item ? item.qty : '';
  document.getElementById('f-unit').value = item ? item.unit : 'stk';
  document.getElementById('f-cat').value = item ? item.category : 'mat';
  document.getElementById('f-expiry').value = item ? (item.expiry || '') : '';
  document.getElementById('f-note').value = item ? (item.note || '') : '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 300);
}

function editItem(id) { openModal(id); }

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}

function closeIfOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const qty = parseFloat(document.getElementById('f-qty').value) || 1;
  const unit = document.getElementById('f-unit').value;
  const category = document.getElementById('f-cat').value;
  const expiry = document.getElementById('f-expiry').value;
  const note = document.getElementById('f-note').value.trim();

  if (!name) { document.getElementById('f-name').focus(); return; }

  if (editId) {
    const idx = items.findIndex(i => i.id === editId);
    if (idx > -1) items[idx] = { ...items[idx], name, qty, unit, category, expiry, note };
  } else {
    items.push({ id: Date.now().toString(), name, qty, unit, category, expiry, note });
  }

  save();
  closeModal();
  render();
}

function deleteItem(id) {
  if (!confirm('Slette denne varen?')) return;
  items = items.filter(i => i.id !== id);
  save();
  render();
}

// Sample data for first-time users
if (items.length === 0) {
  items = [
    { id: '1', name: 'Tomatsuppe', qty: 6, unit: 'boks', category: 'mat', expiry: '2026-08-01', note: 'Øverste hylle' },
    { id: '2', name: 'Knekkebrød', qty: 4, unit: 'pakke', category: 'mat', expiry: '2026-05-15', note: '' },
    { id: '3', name: 'Vann, 5L', qty: 8, unit: 'flaske', category: 'drikke', expiry: '', note: 'Rotér hvert år' },
    { id: '4', name: 'Paracetamol', qty: 2, unit: 'pakke', category: 'medisin', expiry: '2027-01-01', note: '' },
    { id: '5', name: 'Stearinlys', qty: 20, unit: 'stk', category: 'lys', expiry: '', note: '' },
    { id: '6', name: 'Batterier AA', qty: 12, unit: 'stk', category: 'lys', expiry: '', note: 'Sjekk kapasitet 2025' },
    { id: '7', name: 'Havregryn', qty: 3, unit: 'pakke', category: 'mat', expiry: '2025-12-01', note: '' },
  ];
  save();
}

render();
</script>
</body>
</html>
