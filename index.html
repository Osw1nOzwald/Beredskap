<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Beredskapslager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #ddd5c0;
    --text: #2a2418;
    --text-muted: #7a6f5a;
    --accent: #2d5016;
    --accent-light: #4a7a28;
    --accent-bg: #e8f2de;
    --warn: #b85c00;
    --warn-bg: #fdf0e0;
    --danger: #8b1a1a;
    --danger-bg: #fde8e8;
    --ok: #2d5016;
    --ok-bg: #e8f2de;
    --loc-color: #1a3a6b;
    --loc-bg: #e4ecf8;
    --shadow: 0 2px 12px rgba(42,36,24,0.08);
    --shadow-lg: 0 8px 32px rgba(42,36,24,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 110px;
  }

  /* LOGIN SCREEN */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }

  .login-screen h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
    margin: 16px 0 8px;
  }

  .login-screen p {
    font-size: 0.92rem;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .login-icon { font-size: 3.5rem; }

  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.2s;
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }

  .btn-google:hover { border-color: var(--accent); background: var(--accent-bg); }
  .btn-google:active { transform: scale(0.98); }

  .google-logo { width: 22px; height: 22px; }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* MAIN APP */
  #app { display: none; }

  header {
    background: var(--accent);
    color: white;
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    flex: 1;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    opacity: 0.85;
  }

  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    object-fit: cover;
  }

  .btn-signout {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 6px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    padding: 3px 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-signout:hover { background: rgba(255,255,255,0.25); }

  .stats-bar { display: flex; gap: 6px; margin-top: 10px; }

  .stat {
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .stat span { font-size: 1rem; font-weight: 600; display: block; }

  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
    margin-left: 4px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .view-toggle {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    top: 115px;
    z-index: 92;
  }

  .vtab {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .vtab:first-child { border-radius: 10px 0 0 10px; border-right: none; }
  .vtab:last-child  { border-radius: 0 10px 10px 0; }
  .vtab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .filter-row {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 165px;
    z-index: 91;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-tabs::-webkit-scrollbar { display: none; }

  .tab {
    white-space: nowrap;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tab.active     { background: var(--accent);    border-color: var(--accent);    color: white; }
  .tab.loc-active { background: var(--loc-color); border-color: var(--loc-color); color: white; }

  .search-bar {
    padding: 8px 16px 10px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 221px;
    z-index: 90;
  }

  .search-bar input {
    width: 100%;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }

  .content { padding: 14px; }

  .section { margin-bottom: 18px; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding-bottom: 7px;
    border-bottom: 2px solid var(--border);
  }

  .section-icon  { font-size: 1.2rem; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; flex: 1; }

  .section-count {
    background: var(--surface2);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .item-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item-info { flex: 1; min-width: 0; }

  .item-name {
    font-weight: 600;
    font-size: 0.92rem;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

  .item-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
    align-items: center;
  }

  .loc-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--loc-bg);
    color: var(--loc-color);
  }

  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--surface2);
    color: var(--text-muted);
  }

  .expiry-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .badge-ok     { background: var(--ok-bg);     color: var(--ok); }
  .badge-warn   { background: var(--warn-bg);   color: var(--warn); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-none   { background: var(--surface2);  color: var(--text-muted); }

  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

  .item-qty { font-size: 0.82rem; font-weight: 600; color: var(--accent); white-space: nowrap; }

  .item-actions { display: flex; gap: 5px; }

  .btn-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    transition: all 0.15s;
    color: var(--text-muted);
  }

  .btn-icon:hover      { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
  .btn-icon.edit:hover { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

  .fab-area {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 20px 22px;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    display: flex;
    gap: 8px;
    z-index: 200;
  }

  .fab {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.2s;
  }

  .fab:active    { background: var(--accent-light); }
  .fab.fab-loc   { flex: 0 0 52px; background: var(--loc-color); font-size: 1.2rem; }
  .fab.fab-loc:active { background: #2a5499; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,36,24,0.5);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from{opacity:0}to{opacity:1} }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 22px 20px 36px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.28s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header { display: flex; align-items: center; margin-bottom: 18px; }
  .modal-title  { font-family: 'DM Serif Display', serif; font-size: 1.2rem; flex: 1; }

  .modal-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }

  .form-group { margin-bottom: 12px; }

  .form-group label {
    display: block;
    font-size: 0.78rem; font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-submit {
    width: 100%; padding: 13px;
    background: var(--accent); color: white;
    border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem; font-weight: 600;
    cursor: pointer; margin-top: 8px;
    transition: background 0.2s;
  }

  .btn-submit:active { background: var(--accent-light); }
  .btn-submit.blue   { background: var(--loc-color); }
  .btn-submit.blue:active { background: #2a5499; }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 2.2rem; margin-bottom: 8px; }
  .empty-state p { font-size: 0.88rem; }

  .alert-banner {
    border-radius: 12px; padding: 11px 14px; margin-bottom: 12px;
    font-size: 0.83rem; font-weight: 500;
  }

  .alert-danger { background: var(--danger-bg); border: 1.5px solid #d44; color: var(--danger); }
  .alert-warn   { background: var(--warn-bg); border: 1.5px solid #e8a040; color: var(--warn); }
  .alert-banner strong { display: block; margin-bottom: 2px; font-size: 0.88rem; }

  .loc-list { margin-bottom: 14px; }

  .loc-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px;
    margin-bottom: 6px;
  }

  .loc-row-icon  { font-size: 1.1rem; }
  .loc-row-name  { flex: 1; font-weight: 500; font-size: 0.9rem; }
  .loc-row-count { font-size: 0.75rem; color: var(--text-muted); }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .section-label {
    font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px;
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <p>Laster beredskapslager…</p>
</div>

<!-- Login -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-icon">🏠</div>
  <h1>Beredskapslager</h1>
  <p>Logg inn med Google for å se og redigere det felles lageret ditt.</p>
  <button class="btn-google" onclick="signIn()">
    <svg class="google-logo" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Logg inn med Google
  </button>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div class="header-top">
      <h1>🏠 Beredskapslager</h1>
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <button class="btn-signout" onclick="signOut()">Logg ut</button>
      </div>
    </div>
    <div style="font-size:0.72rem;opacity:0.7;display:flex;align-items:center;gap:4px">
      Synkronisert med skyen <span class="sync-dot"></span>
    </div>
    <div class="stats-bar">
      <div class="stat"><span id="total-count">0</span>varer</div>
      <div class="stat"><span id="expiring-count">0</span>utløper snart</div>
      <div class="stat"><span id="expired-count">0</span>utgått</div>
    </div>
  </header>

  <div class="view-toggle">
    <button class="vtab active" id="vtab-cat" onclick="setViewMode('kategori')">🏷️ Kategorier</button>
    <button class="vtab" id="vtab-loc" onclick="setViewMode('plassering')">📍 Plasseringer</button>
  </div>

  <div class="filter-row">
    <div class="filter-tabs" id="tabs"></div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 Søk i lageret..." oninput="render()">
  </div>

  <div class="content" id="content"></div>

  <div class="fab-area">
    <button class="fab" onclick="openItemModal()">＋ Legg til vare</button>
    <button class="fab fab-loc" onclick="openLocModal()" title="Administrer plasseringer">📍</button>
  </div>
</div>

<!-- Item Modal -->
<div class="overlay" id="item-overlay" onclick="closeIfOutside(event,'item-overlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="item-modal-title">Ny vare</div>
      <button class="modal-close" onclick="closeItemModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Navn på vare</label>
      <input type="text" id="f-name" placeholder="f.eks. Tomatsuppe">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Antall</label>
        <input type="number" id="f-qty" placeholder="1" min="1">
      </div>
      <div class="form-group">
        <label>Enhet</label>
        <select id="f-unit">
          <option>stk</option><option>liter</option><option>kg</option>
          <option>g</option><option>pakke</option><option>boks</option>
          <option>pose</option><option>flaske</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="f-cat">
        <option value="mat">🥫 Mat & Hermetikk</option>
        <option value="drikke">💧 Drikke & Vann</option>
        <option value="medisin">💊 Medisin & Førstehjelp</option>
        <option value="hygiene">🧼 Hygiene & Rengjøring</option>
        <option value="lys">🕯️ Lys & Batteri</option>
        <option value="varme">🔥 Varme & Klær</option>
        <option value="annet">📦 Annet</option>
      </select>
    </div>
    <div class="form-group">
      <label>Plassering</label>
      <select id="f-loc"></select>
    </div>
    <div class="form-group">
      <label>Utløpsdato (valgfritt)</label>
      <input type="date" id="f-expiry">
    </div>
    <div class="form-group">
      <label>Notat (valgfritt)</label>
      <input type="text" id="f-note" placeholder="f.eks. merkevare, hylleplass...">
    </div>
    <button class="btn-submit" onclick="saveItem()">Lagre vare</button>
  </div>
</div>

<!-- Location Modal -->
<div class="overlay" id="loc-overlay" onclick="closeIfOutside(event,'loc-overlay')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📍 Plasseringer</div>
      <button class="modal-close" onclick="closeLocModal()">✕</button>
    </div>
    <div class="loc-list" id="loc-list"></div>
    <div class="divider"></div>
    <p class="section-label">Legg til ny plassering</p>
    <div class="form-row">
      <div class="form-group">
        <label>Ikon</label>
        <select id="new-loc-icon">
          <option value="📦">📦 Boks/kasse</option>
          <option value="🏠">🏠 Hjemme</option>
          <option value="🚗">🚗 Bil</option>
          <option value="🏚️">🏚️ Bod</option>
          <option value="🧳">🧳 Bag/sekk</option>
          <option value="🗄️">🗄️ Skuff/skap</option>
          <option value="🧊">🧊 Frys/kjøler</option>
          <option value="📋">📋 Annet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Navn</label>
        <input type="text" id="new-loc-name" placeholder="f.eks. Boks 1">
      </div>
    </div>
    <button class="btn-submit blue" onclick="addLocation()">＋ Legg til plassering</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, addDoc, setDoc, deleteDoc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDkaMOU6rr581smWspBdTtLsUosoZmcur8",
  authDomain: "beredskapslager-4fa40.firebaseapp.com",
  projectId: "beredskapslager-4fa40",
  storageBucket: "beredskapslager-4fa40.firebasestorage.app",
  messagingSenderId: "337356922940",
  appId: "1:337356922940:web:9d3ab9c6b7a1e2c54be339"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// ---- State ----
const CATEGORIES = {
  mat:    { label: 'Mat & Hermetikk',       icon: '🥫' },
  drikke: { label: 'Drikke & Vann',         icon: '💧' },
  medisin:{ label: 'Medisin & Førstehjelp', icon: '💊' },
  hygiene:{ label: 'Hygiene & Rengjøring',  icon: '🧼' },
  lys:    { label: 'Lys & Batteri',         icon: '🕯️' },
  varme:  { label: 'Varme & Klær',          icon: '🔥' },
  annet:  { label: 'Annet',                 icon: '📦' },
};

let items     = [];
let locations = [];
let editId    = null;
let activeTab = 'alle';
let viewMode  = 'kategori';
let unsubItems, unsubLocs;

// ---- Auth ----
window.signIn = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { console.error(e); alert('Innlogging feilet. Prøv igjen.'); }
};

window.signOut = async () => {
  if (!confirm('Logg ut?')) return;
  if (unsubItems) unsubItems();
  if (unsubLocs)  unsubLocs();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, user => {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-avatar').src = user.photoURL || '';
    startListeners();
  } else {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    items = []; locations = [];
  }
});

function startListeners() {
  // Shared collection – same data for everyone
  const itemsRef = collection(db, 'shared', 'lager', 'items');
  const locsRef  = collection(db, 'shared', 'lager', 'locations');

  unsubItems = onSnapshot(query(itemsRef, orderBy('name')), snap => {
    items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });

  unsubLocs = onSnapshot(query(locsRef, orderBy('name')), snap => {
    locations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

// ---- Helpers ----
function getDaysLeft(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
}

function expiryBadge(d) {
  const days = getDaysLeft(d);
  if (days === null) return '<span class="expiry-badge badge-none">Ingen dato</span>';
  if (days < 0)   return `<span class="expiry-badge badge-danger">Utgått for ${-days}d siden</span>`;
  if (days === 0) return '<span class="expiry-badge badge-danger">Utgår i dag!</span>';
  if (days <= 30) return `<span class="expiry-badge badge-warn">Om ${days} dag${days===1?'':'er'}</span>`;
  if (days <= 90) return `<span class="expiry-badge badge-warn">Om ${days} dager</span>`;
  return `<span class="expiry-badge badge-ok">${new Date(d).toLocaleDateString('no-NO',{day:'numeric',month:'short',year:'numeric'})}</span>`;
}

// ---- Render ----
window.render = function() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();

  const expiringSoon = items.filter(i => { const d=getDaysLeft(i.expiry); return d!==null&&d>=0&&d<=30; });
  const expired      = items.filter(i => { const d=getDaysLeft(i.expiry); return d!==null&&d<0; });
  document.getElementById('total-count').textContent    = items.length;
  document.getElementById('expiring-count').textContent = expiringSoon.length;
  document.getElementById('expired-count').textContent  = expired.length;

  // Tabs
  let tabHtml = `<button class="tab ${activeTab==='alle'?'active':''}" onclick="setTab('alle')">Alle (${items.length})</button>`;
  if (viewMode === 'kategori') {
    [...new Set(items.map(i=>i.category))].forEach(cat => {
      const info = CATEGORIES[cat]||{label:cat,icon:'📦'};
      const c = items.filter(i=>i.category===cat).length;
      tabHtml += `<button class="tab ${activeTab===cat?'active':''}" onclick="setTab('${cat}')">${info.icon} ${info.label} (${c})</button>`;
    });
  } else {
    locations.forEach(loc => {
      const c = items.filter(i=>i.locId===loc.id).length;
      if (!c) return;
      tabHtml += `<button class="tab ${activeTab===loc.id?'loc-active':''}" onclick="setTab('${loc.id}')">${loc.icon} ${loc.name} (${c})</button>`;
    });
    const noLoc = items.filter(i=>!i.locId||!locations.find(l=>l.id===i.locId)).length;
    if (noLoc) tabHtml += `<button class="tab ${activeTab==='ingen'?'loc-active':''}" onclick="setTab('ingen')">📦 Ingen plassering (${noLoc})</button>`;
  }
  document.getElementById('tabs').innerHTML = tabHtml;

  const filtered = items.filter(i => {
    const loc = locations.find(l=>l.id===i.locId);
    const matchQ = !q || i.name.toLowerCase().includes(q) || (i.note||'').toLowerCase().includes(q)
                      || (loc && loc.name.toLowerCase().includes(q));
    let matchTab = activeTab === 'alle';
    if (!matchTab) {
      if (viewMode === 'kategori') matchTab = i.category === activeTab;
      else if (activeTab === 'ingen') matchTab = !i.locId || !locations.find(l=>l.id===i.locId);
      else matchTab = i.locId === activeTab;
    }
    return matchQ && matchTab;
  });

  let html = '';

  if (!q && activeTab === 'alle') {
    if (expired.length > 0)
      html += `<div class="alert-banner alert-danger">⚠️ <strong>${expired.length} vare${expired.length>1?'r':''} er utgått på dato!</strong>Sjekk og erstatt disse snarest.</div>`;
    else if (expiringSoon.length > 0)
      html += `<div class="alert-banner alert-warn">🕐 <strong>${expiringSoon.length} vare${expiringSoon.length>1?'r':''} utløper innen 30 dager.</strong>Husk å fornye lageret.</div>`;
  }

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">${items.length===0?'📦':'🔍'}</div><p>${items.length===0?'Lageret er tomt. Trykk + for å legge til din første vare!':'Ingen varer matcher søket.'}</p></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const groups = {};
  filtered.forEach(item => {
    let key, label, icon;
    if (viewMode === 'kategori') {
      key = item.category;
      const info = CATEGORIES[key]||{label:key,icon:'📦'};
      label = info.label; icon = info.icon;
    } else {
      const loc = locations.find(l=>l.id===item.locId);
      key = loc ? loc.id : '__ingen';
      label = loc ? loc.name : 'Ingen plassering';
      icon  = loc ? loc.icon : '📦';
    }
    if (!groups[key]) groups[key] = { label, icon, items:[] };
    groups[key].items.push(item);
  });

  Object.values(groups).forEach(({ label, icon, items: gItems }) => {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-icon">${icon}</span>
        <span class="section-title">${label}</span>
        <span class="section-count">${gItems.length} varer</span>
      </div>`;

    gItems.forEach(item => {
      const loc     = locations.find(l=>l.id===item.locId);
      const catInfo = CATEGORIES[item.category]||{label:item.category,icon:'📦'};
      html += `<div class="item-card">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
          <div class="item-badges">
            ${viewMode==='kategori' && loc ? `<span class="loc-badge">${loc.icon} ${loc.name}</span>` : ''}
            ${viewMode==='plassering' ? `<span class="cat-badge">${catInfo.icon} ${catInfo.label}</span>` : ''}
            ${expiryBadge(item.expiry)}
          </div>
        </div>
        <div class="item-right">
          <span class="item-qty">${item.qty} ${item.unit}</span>
          <div class="item-actions">
            <button class="btn-icon edit" onclick="openItemModal('${item.id}')">✏️</button>
            <button class="btn-icon" onclick="deleteItem('${item.id}')">🗑️</button>
          </div>
        </div>
      </div>`;
    });

    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
};

window.setTab = t => { activeTab = t; render(); };

window.setViewMode = mode => {
  viewMode = mode; activeTab = 'alle';
  document.getElementById('vtab-cat').classList.toggle('active', mode==='kategori');
  document.getElementById('vtab-loc').classList.toggle('active', mode==='plassering');
  render();
};

// ---- Item Modal ----
function populateLocSelect(selectedId) {
  const sel = document.getElementById('f-loc');
  sel.innerHTML = '<option value="">— Ingen plassering —</option>';
  locations.forEach(loc => {
    const o = document.createElement('option');
    o.value = loc.id; o.textContent = `${loc.icon} ${loc.name}`;
    if (loc.id === selectedId) o.selected = true;
    sel.appendChild(o);
  });
}

window.openItemModal = (id = null) => {
  editId = id;
  const item = id ? items.find(i=>i.id===id) : null;
  document.getElementById('item-modal-title').textContent = item ? 'Rediger vare' : 'Ny vare';
  document.getElementById('f-name').value   = item?.name     || '';
  document.getElementById('f-qty').value    = item?.qty      || '';
  document.getElementById('f-unit').value   = item?.unit     || 'stk';
  document.getElementById('f-cat').value    = item?.category || 'mat';
  document.getElementById('f-expiry').value = item?.expiry   || '';
  document.getElementById('f-note').value   = item?.note     || '';
  const defaultLoc = (!item && viewMode==='plassering' && activeTab!=='alle' && activeTab!=='ingen') ? activeTab : (item?.locId||'');
  populateLocSelect(defaultLoc);
  document.getElementById('item-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(), 300);
};

window.closeItemModal = () => {
  document.getElementById('item-overlay').classList.remove('open');
  editId = null;
};

window.saveItem = async () => {
  const name     = document.getElementById('f-name').value.trim();
  const qty      = parseFloat(document.getElementById('f-qty').value)||1;
  const unit     = document.getElementById('f-unit').value;
  const category = document.getElementById('f-cat').value;
  const locId    = document.getElementById('f-loc').value || null;
  const expiry   = document.getElementById('f-expiry').value;
  const note     = document.getElementById('f-note').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }

  const data = { name, qty, unit, category, locId: locId||null, expiry: expiry||null, note: note||null };
  const itemsRef = collection(db, 'shared', 'lager', 'items');

  if (editId) {
    await setDoc(doc(itemsRef, editId), data);
  } else {
    await addDoc(itemsRef, data);
  }
  closeItemModal();
};

window.deleteItem = async (id) => {
  if (!confirm('Slette denne varen?')) return;
  await deleteDoc(doc(db, 'shared', 'lager', 'items', id));
};

// ---- Location Modal ----
window.openLocModal = () => { renderLocList(); document.getElementById('loc-overlay').classList.add('open'); };
window.closeLocModal = () => { document.getElementById('loc-overlay').classList.remove('open'); };

function renderLocList() {
  const el = document.getElementById('loc-list');
  if (!locations.length) {
    el.innerHTML = '<p style="font-size:0.85rem;color:var(--text-muted);text-align:center;padding:10px 0">Ingen plasseringer ennå. Legg til nedenfor!</p>';
    return;
  }
  el.innerHTML = locations.map(loc => {
    const c = items.filter(i=>i.locId===loc.id).length;
    return `<div class="loc-row">
      <span class="loc-row-icon">${loc.icon}</span>
      <span class="loc-row-name">${loc.name}</span>
      <span class="loc-row-count">${c} vare${c!==1?'r':''}</span>
      <button class="btn-icon" onclick="deleteLocation('${loc.id}')">🗑️</button>
    </div>`;
  }).join('');
}

window.addLocation = async () => {
  const name = document.getElementById('new-loc-name').value.trim();
  const icon = document.getElementById('new-loc-icon').value;
  if (!name) { document.getElementById('new-loc-name').focus(); return; }
  await addDoc(collection(db, 'shared', 'lager', 'locations'), { name, icon });
  document.getElementById('new-loc-name').value = '';
  renderLocList();
};

window.deleteLocation = async (id) => {
  const c = items.filter(i=>i.locId===id).length;
  const msg = c > 0
    ? `Denne plasseringen har ${c} vare${c>1?'r':''}. Slette uansett? Varene beholder innholdet, men mister plassering.`
    : 'Slette denne plasseringen?';
  if (!confirm(msg)) return;
  // Remove locId from items
  const itemsRef = collection(db, 'shared', 'lager', 'items');
  const affected = items.filter(i=>i.locId===id);
  await Promise.all(affected.map(i => setDoc(doc(itemsRef, i.id), {...i, locId: null})));
  await deleteDoc(doc(db, 'shared', 'lager', 'locations', id));
  renderLocList();
};

window.closeIfOutside = (e, id) => {
  if (e.target === document.getElementById(id)) {
    if (id==='item-overlay') closeItemModal(); else closeLocModal();
  }
};

</script>
</body>
</html>
